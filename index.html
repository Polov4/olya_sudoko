<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⚡ Lightning Sudoku Pro</title>
    <style>
        :root { 
            --bg: #01020a; 
            --neon: #00e5ff; 
            --grey: #1a1a2e; 
            --red: #ff0000; 
            --solid-fill: #00e5ff; 
            --cross-fill: rgba(0, 229, 255, 0.15);
        }
        body { background: var(--bg); color: #fff; font-family: 'Courier New', monospace; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; user-select: none; }
        #app { width: 95%; max-width: 400px; display: flex; flex-direction: column; gap: 10px; }
        
        /* Экраны финала */
        #end-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 100; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        
        /* УВЕЛИЧИЛ ВИДЕО ТУТ */
        #end-media { 
            max-width: 95vw; 
            max-height: 65vh; 
            width: auto;
            border: 3px solid var(--neon); 
            border-radius: 8px; 
            box-shadow: 0 0 40px var(--neon); 
        }
        
        #end-text { font-size: 20px; margin-top: 20px; font-weight: bold; text-shadow: 0 0 10px; padding: 0 20px; }

        /* Верхняя панель */
        .stats-bar { display: flex; justify-content: space-between; font-size: 14px; color: #fff; background: var(--grey); padding: 5px 10px; border-radius: 4px; border: 1px solid #333; }
        .header { display: flex; justify-content: space-between; font-size: 11px; color: var(--neon); text-transform: uppercase; }
        
        .diff-bar { display: flex; justify-content: space-around; padding-bottom: 5px; }
        .diff-btn { cursor: pointer; opacity: 0.5; font-size: 10px; border-bottom: 1px solid transparent; transition: 0.2s; }
        .diff-btn.active { opacity: 1; color: var(--neon); border-bottom: 1px solid var(--neon); font-weight: bold; }
        .diff-btn.locked { color: #555; cursor: not-allowed; }

        /* Сетка */
        #grid { display: grid; grid-template-columns: repeat(9, 1fr); aspect-ratio: 1/1; border: 2px solid var(--neon); background: #000; box-shadow: 0 0 10px rgba(0, 229, 255, 0.2); }
        .cell { display: flex; align-items: center; justify-content: center; border: 0.5px solid #111; font-size: 24px; cursor: pointer; color: #777; transition: background-color 0.2s; position: relative; }
        
        /* Разделители */
        .cell:nth-child(3n) { border-right: 2px solid #444; }
        .cell:nth-child(9n) { border-right: 0.5px solid #111; }
        .cell:nth-of-type(n+19):nth-of-type(-n+27), .cell:nth-of-type(n+46):nth-of-type(-n+54) { border-bottom: 2px solid #444; }

        /* Подсветка */
        .cell.selected { background-color: var(--solid-fill) !important; color: #000 !important; font-weight: bold; }
        .cell.same-num { background-color: rgba(0, 229, 255, 0.5) !important; color: #fff !important; }
        .cell.highlight { background-color: var(--cross-fill) !important; }
        .cell.fixed { color: #fff; font-weight: bold; background: #080808; }
        .cell.error { color: var(--red); text-shadow: 0 0 5px var(--red); }
        .cell.combo-flash { background-color: var(--neon) !important; color: #000 !important; box-shadow: 0 0 15px var(--neon); } /* Вспышка */

        /* Кнопки */
        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .num-btn { background: var(--grey); border: 1px solid var(--neon); color: #fff; padding: 15px; font-size: 24px; border-radius: 4px; cursor: pointer; transition: 0.1s; }
        .num-btn:active { background: var(--neon); color: #000; }
        .num-btn.hidden { visibility: hidden; } 
        
        .action-btn { background: none; border: 1px solid var(--neon); color: #fff; padding: 10px; font-size: 11px; cursor: pointer; border-radius: 4px; flex: 1; text-transform: uppercase; }
        .action-btn.active { background: var(--neon); color: #000; font-weight: bold; }
        
        .note-grid { display: grid; grid-template-columns: repeat(3, 1fr); font-size: 9px; color: var(--neon); width: 100%; height: 100%; pointer-events: none; align-items: center; justify-items: center; }
    </style>
</head>
<body>

    <div id="end-screen">
        <div id="end-media-container"></div>
        <div id="end-text"></div>
        <button class="action-btn" style="margin-top: 30px; padding: 15px 30px; font-size: 14px;" onclick="location.reload()">ИГРАТЬ СНОВА 🤘</button>
    </div>

    <div id="app">
        <div class="diff-bar">
            <span id="btn-easy" class="diff-btn active" onclick="setMode('easy', this)">EASY</span>
            <span id="btn-medium" class="diff-btn" onclick="setMode('medium', this)">MEDIUM</span>
            <span id="btn-hard" class="diff-btn" onclick="setMode('hard', this)">HARD</span>
            <span id="btn-nightmare" class="diff-btn" onclick="setMode('nightmare', this)" style="display:none; color: #ff00ff;">NIGHTMARE 💀</span>
        </div>

        <div class="stats-bar">
            <div>⏱ <span id="timer">00:00</span></div>
            <div style="color: var(--neon);">🏆 <span id="score">0</span></div>
        </div>
        
        <div class="header">
            <div id="errs" style="color: var(--red);">ОШИБКИ: 0/3</div>
            <div>RIDE THE LIGHTNING</div>
        </div>

        <div id="grid"></div>

        <div style="display:flex; gap:8px;">
            <button id="note-toggle" class="action-btn" onclick="isNote = !isNote; this.classList.toggle('active')">ЗАМЕТКИ</button>
            <button class="action-btn" onclick="press(0)">СТЕРЕТЬ</button>
        </div>

        <div class="numpad">
            <button id="key-1" class="num-btn" onclick="press(1)">1</button>
            <button id="key-2" class="num-btn" onclick="press(2)">2</button>
            <button id="key-3" class="num-btn" onclick="press(3)">3</button>
            <button id="key-4" class="num-btn" onclick="press(4)">4</button>
            <button id="key-5" class="num-btn" onclick="press(5)">5</button>
            <button id="key-6" class="num-btn" onclick="press(6)">6</button>
            <button id="key-7" class="num-btn" onclick="press(7)">7</button>
            <button id="key-8" class="num-btn" onclick="press(8)">8</button>
            <button id="key-9" class="num-btn" onclick="press(9)">9</button>
        </div>
    </div>

    <script>
        let sel = null, errs = 0, isNote = false, sol = [], isOver = false;
        let notes = Array(81).fill().map(() => []);
        let score = 0, time = 0, timerInt = null;
        let currentMode = 'easy';

        let winsEasy = parseInt(localStorage.getItem('win_easy')) || 0;
        let winsHard = parseInt(localStorage.getItem('win_hard')) || 0;

        const sounds = {
            bell: new Audio('error_bell.mp3'),
            yeah1: new Audio('row_yeah1.mp3'),
            yeah2: new Audio('row_yeah2.mp3'),
            fade: new Audio('lose_fade.mp3'),
            ride: new Audio('win_ride.mp3')
        };
        function playSnd(name) { sounds[name].currentTime = 0; sounds[name].play().catch(()=>{}); }

        function initMenu() {
            if(winsEasy < 2) {
                document.getElementById('btn-medium').innerHTML = "MEDIUM 🔒"; document.getElementById('btn-medium').classList.add('locked');
                document.getElementById('btn-hard').innerHTML = "HARD 🔒"; document.getElementById('btn-hard').classList.add('locked');
            } else {
                document.getElementById('btn-medium').innerHTML = "MEDIUM"; document.getElementById('btn-medium').classList.remove('locked');
                document.getElementById('btn-hard').innerHTML = "HARD"; document.getElementById('btn-hard').classList.remove('locked');
            }
            if(winsHard >= 4) document.getElementById('btn-nightmare').style.display = 'inline';
        }

        function setMode(mode, btn) {
            if(btn.classList.contains('locked')) return;
            document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentMode = mode;
            let hiddenCells = { 'easy': 30, 'medium': 45, 'hard': 55, 'nightmare': 65 }[mode];
            newGame(81 - hiddenCells);
        }

        function formatTime(s) { return (Math.floor(s/60)).toString().padStart(2,'0') + ':' + (s%60).toString().padStart(2,'0'); }

        function newGame(count = 50) {
            clearInterval(timerInt);
            time = 0; score = 0; errs = 0; isOver = false; notes = Array(81).fill().map(() => []);
            document.getElementById('timer').innerText = "00:00";
            document.getElementById('score').innerText = "0";
            document.getElementById('errs').innerText = "ОШИБКИ: 0/3";
            
            timerInt = setInterval(() => { time++; document.getElementById('timer').innerText = formatTime(time); }, 1000);

            const g = document.getElementById('grid'); g.innerHTML = '';
            const base = "534678912672195348198342567859761423426853791713924856961537284287419635345286179";
            sol = base.split('');

            sol.forEach((v, i) => {
                const c = document.createElement('div'); c.className = 'cell'; c.dataset.index = i;
                if(Math.random() < count/81) { c.innerText = v; c.classList.add('fixed'); }
                c.onclick = () => {
                    if(isOver) return;
                    document.querySelectorAll('.cell').forEach(x=>x.classList.remove('selected'));
                    c.classList.add('selected'); sel = {el: c, i: i};
                    updateHighlights(i, c.innerText);
                };
                g.appendChild(c);
            });
            updateKeyboard();
        }

        function press(n) {
            if(!sel || sel.el.classList.contains('fixed') || isOver) return;
            
            if(isNote && n !== 0) {
                if(notes[sel.i].includes(n)) notes[sel.i] = notes[sel.i].filter(x=>x!==n);
                else notes[sel.i].push(n);
                drawNotes(sel.el, sel.i); updateHighlights(sel.i, ""); return;
            }
            
            if(n === 0) { 
                sel.el.innerHTML = ''; notes[sel.i] = []; sel.el.classList.remove('error'); 
                updateHighlights(sel.i, ""); updateKeyboard(); return; 
            }
            
            sel.el.innerText = n;
            if(n.toString() === sol[sel.i]) { 
                sel.el.classList.remove('error'); 
                notes[sel.i] = []; 
                score += 100;
                document.getElementById('score').innerText = score;
                updateHighlights(sel.i, n.toString()); 
                checkCombo(sel.i); // ТУТ ВЫЗЫВАЕТСЯ ПРОВЕРКА
                updateKeyboard();
                checkWin();
            } else { 
                errs++; 
                score = Math.max(0, score - 50);
                document.getElementById('score').innerText = score;
                document.getElementById('errs').innerText = `ОШИБКИ: ${errs}/3`; 
                sel.el.classList.add('error');
                playSnd('bell'); 
                if(errs >= 3) gameOver(false);
            }
        }

        function updateKeyboard() {
            for (let i = 1; i <= 9; i++) {
                const count = Array.from(document.querySelectorAll('.cell')).filter(c => c.innerText == i && !c.querySelector('.note-grid')).length;
                const btn = document.getElementById(`key-${i}`);
                if (count >= 9) btn.classList.add('hidden');
                else btn.classList.remove('hidden');
            }
        }

        // НОВАЯ ЛОГИКА ДЛЯ КВАДРАТОВ 3х3
        function checkCombo(index) {
            const r = Math.floor(index / 9), c = index % 9;
            const sr = Math.floor(r / 3), sc = Math.floor(c / 3);

            const rowCells = Array.from(document.querySelectorAll('.cell')).filter(el => Math.floor(el.dataset.index / 9) === r);
            const colCells = Array.from(document.querySelectorAll('.cell')).filter(el => el.dataset.index % 9 === c);
            const sqCells = Array.from(document.querySelectorAll('.cell')).filter(el => {
                const tr = Math.floor(el.dataset.index / 9), tc = el.dataset.index % 9;
                return Math.floor(tr / 3) === sr && Math.floor(tc / 3) === sc;
            });
            
            const isRowFull = rowCells.every(el => el.innerText !== '' && !el.classList.contains('error') && !el.querySelector('.note-grid'));
            const isColFull = colCells.every(el => el.innerText !== '' && !el.classList.contains('error') && !el.querySelector('.note-grid'));
            const isSqFull = sqCells.every(el => el.innerText !== '' && !el.classList.contains('error') && !el.querySelector('.note-grid'));

            if(isRowFull || isColFull || isSqFull) {
                // Рандомный YEAH
                const randomYeah = Math.random() < 0.5 ? 'yeah1' : 'yeah2';
                playSnd(randomYeah);
                
                // Вспышка того, что собралось
                if (isRowFull) rowCells.forEach(el => { el.classList.add('combo-flash'); setTimeout(()=> el.classList.remove('combo-flash'), 500); });
                if (isColFull) colCells.forEach(el => { el.classList.add('combo-flash'); setTimeout(()=> el.classList.remove('combo-flash'), 500); });
                if (isSqFull) sqCells.forEach(el => { el.classList.add('combo-flash'); setTimeout(()=> el.classList.remove('combo-flash'), 500); });
            }
        }

        function checkWin() {
            const filled = Array.from(document.querySelectorAll('.cell')).filter(c => c.innerText !== '' && !c.querySelector('.note-grid')).length;
            if (filled === 81) gameOver(true);
        }

        function gameOver(isWin) {
            isOver = true;
            clearInterval(timerInt);
            const screen = document.getElementById('end-screen');
            const mediaContainer = document.getElementById('end-media-container');
            const text = document.getElementById('end-text');
            screen.style.display = 'flex';

            if (isWin) {
                // ТУТ СТОИТ LOOP, ВИДЕО БУДЕТ КРУТИТЬСЯ БЕСКОНЕЧНО
                mediaContainer.innerHTML = '<video id="end-media" src="win.mp4" autoplay loop playsinline muted></video>';
                
                text.innerText = `YEEEAAAH! ТЫ ЗАРЯДИЛА ЭТУ МОЛНИЮ! ⚡\nВремя: ${formatTime(time)} | Очки: ${score}`;
                text.style.color = "var(--neon)";
                text.style.textShadow = "0 0 15px var(--neon)";
                playSnd('ride');
                
                if(currentMode === 'easy') { winsEasy++; localStorage.setItem('win_easy', winsEasy); }
                if(currentMode === 'hard' || currentMode === 'nightmare') { winsHard++; localStorage.setItem('win_hard', winsHard); }
            } else {
                // ТУТ ТОЖЕ СТОИТ LOOP
                mediaContainer.innerHTML = '<video id="end-media" src="lose.mp4" autoplay loop playsinline muted></video>';
                
                text.innerText = "I HAVE LOST THE WILL TO LIVE... 💀";
                text.style.color = "var(--red)";
                text.style.textShadow = "0 0 15px var(--red)";
                playSnd('fade');
            }
        }

        function drawNotes(el, i) { el.innerHTML = '<div class="note-grid">' + [1,2,3,4,5,6,7,8,9].map(x => `<div>${notes[i].includes(x)?x:''}</div>`).join('') + '</div>'; }
        function updateHighlights(index, value) {
            const cells = document.querySelectorAll('.cell');
            cells.forEach(c => c.classList.remove('highlight', 'same-num'));
            const row = Math.floor(index / 9), col = index % 9;
            cells.forEach(c => {
                const i = parseInt(c.dataset.index);
                if((Math.floor(i / 9) === row || i % 9 === col) && i !== index) c.classList.add('highlight');
                if(value && c.innerText === value && !c.querySelector('.note-grid') && i !== index) c.classList.add('same-num');
            });
        }

        initMenu();
        setMode('easy', document.getElementById('btn-easy'));
    </script>
</body>
</html>
