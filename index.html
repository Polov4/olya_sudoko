<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⚡ Lightning Sudoku Pro</title>
    <style>
        :root { 
            --bg: #01020a; 
            --neon: #00e5ff; 
            --grey: #1a1a2e; 
            --red: #ff0000; 
            --solid-fill: #00e5ff; 
            --cross-fill: rgba(0, 229, 255, 0.15);
        }
        body { background: var(--bg); color: #fff; font-family: 'Courier New', monospace; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
        #app { width: 95%; max-width: 400px; display: flex; flex-direction: column; gap: 12px; }
        
        /* Сетка */
        #grid { display: grid; grid-template-columns: repeat(9, 1fr); aspect-ratio: 1/1; border: 2px solid var(--neon); background: #000; }
        .cell { display: flex; align-items: center; justify-content: center; border: 0.5px solid #111; font-size: 24px; cursor: pointer; color: #777; transition: 0.1s; }
        
        /* Разделители 3х3 */
        .cell:nth-child(3n) { border-right: 2px solid #444; }
        .cell:nth-child(9n) { border-right: 0.5px solid #111; }
        .cell:nth-of-type(n+19):nth-of-type(-n+27), .cell:nth-of-type(n+46):nth-of-type(-n+54) { border-bottom: 2px solid #444; }

        /* ПОДСВЕТКА */
        .cell.selected { background-color: var(--solid-fill) !important; color: #000 !important; font-weight: bold; }
        .cell.same-num { background-color: rgba(0, 229, 255, 0.5) !important; color: #fff !important; }
        .cell.highlight { background-color: var(--cross-fill) !important; } /* Тот самый крестик */

        .cell.fixed { color: #fff; font-weight: bold; background: #080808; }
        .cell.error { color: var(--red); text-shadow: 0 0 5px var(--red); }

        .header { display: flex; justify-content: space-between; font-size: 11px; color: var(--neon); text-transform: uppercase; }
        .diff-bar { display: flex; justify-content: space-around; padding-bottom: 5px; }
        .diff-btn { cursor: pointer; opacity: 0.5; font-size: 10px; border-bottom: 1px solid transparent; }
        .diff-btn.active { opacity: 1; color: var(--neon); border-bottom: 1px solid var(--neon); }

        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .num-btn { background: var(--grey); border: 1px solid var(--neon); color: #fff; padding: 15px; font-size: 24px; border-radius: 4px; cursor: pointer; }
        .num-btn:active { background: var(--neon); color: #000; }
        
        .action-btn { background: none; border: 1px solid var(--neon); color: #fff; padding: 10px; font-size: 11px; cursor: pointer; border-radius: 4px; flex: 1; text-transform: uppercase; }
        .action-btn.active { background: var(--neon); color: #000; }
        
        .note-grid { display: grid; grid-template-columns: repeat(3, 1fr); font-size: 9px; color: var(--neon); width: 100%; height: 100%; pointer-events: none; }
    </style>
</head>
<body>
    <div id="app">
        <div class="diff-bar">
            <span class="diff-btn active" onclick="changeDiff(45, this)">EASY</span>
            <span class="diff-btn" onclick="changeDiff(35, this)">MEDIUM</span>
            <span class="diff-btn" onclick="changeDiff(25, this)">HARD</span>
        </div>
        <div class="header"><div id="errs">ОШИБКИ: 0/3</div><div>RIDE THE LIGHTNING</div></div>
        <div id="grid"></div>
        <div style="display:flex; gap:8px;">
            <button id="note-toggle" class="action-btn" onclick="isNote = !isNote; this.classList.toggle('active')">ЗАМЕТКИ</button>
            <button class="action-btn" onclick="press(0)">СТЕРЕТЬ</button>
        </div>
        <div class="numpad">
            <button class="num-btn" onclick="press(1)">1</button><button class="num-btn" onclick="press(2)">2</button><button class="num-btn" onclick="press(3)">3</button>
            <button class="num-btn" onclick="press(4)">4</button><button class="num-btn" onclick="press(5)">5</button><button class="num-btn" onclick="press(6)">6</button>
            <button class="num-btn" onclick="press(7)">7</button><button class="num-btn" onclick="press(8)">8</button><button class="num-btn" onclick="press(9)">9</button>
        </div>
    </div>

    <script>
        let sel = null, errs = 0, isNote = false, sol = [], isOver = false;
        let notes = Array(81).fill().map(() => []);

        function changeDiff(n, btn) {
            document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            newGame(n);
        }

        function updateHighlights(index, value) {
            const cells = document.querySelectorAll('.cell');
            cells.forEach(c => c.classList.remove('highlight', 'same-num'));
            const row = Math.floor(index / 9), col = index % 9;
            
            cells.forEach(c => {
                const i = parseInt(c.dataset.index);
                const r = Math.floor(i / 9), l = i % 9;
                
                // Рисуем крестик
                if((r === row || l === col) && i !== index) c.classList.add('highlight');
                
                // Подсвечиваем такие же цифры
                if(value && c.innerText === value && !c.querySelector('.note-grid') && i !== index) {
                    c.classList.add('same-num');
                }
            });
        }

        function newGame(count = 45) {
            const g = document.getElementById('grid'); g.innerHTML = '';
            errs = 0; isOver = false;
            document.getElementById('errs').innerText = "ОШИБКИ: 0/3";
            const base = "534678912672195348198342567859761423426853791713924856961537284287419635345286179";
            sol = base.split('');
            sol.forEach((v, i) => {
                const c = document.createElement('div'); c.className = 'cell'; c.dataset.index = i;
                if(Math.random() < count/81) { c.innerText = v; c.classList.add('fixed'); }
                c.onclick = () => {
                    if(isOver) return;
                    document.querySelectorAll('.cell').forEach(x=>x.classList.remove('selected'));
                    c.classList.add('selected'); sel = {el: c, i: i};
                    updateHighlights(i, c.innerText);
                };
                g.appendChild(c);
            });
        }

        function press(n) {
            if(!sel || sel.el.classList.contains('fixed') || isOver) return;
            if(isNote && n !== 0) {
                if(notes[sel.i].includes(n)) notes[sel.i] = notes[sel.i].filter(x=>x!==n);
                else notes[sel.i].push(n);
                drawNotes(sel.el, sel.i); updateHighlights(sel.i, ""); return;
            }
            if(n === 0) { sel.el.innerHTML = ''; notes[sel.i] = []; sel.el.classList.remove('error'); updateHighlights(sel.i, ""); return; }
            sel.el.innerText = n;
            if(n.toString() === sol[sel.i]) { 
                sel.el.classList.remove('error'); 
                notes[sel.i] = []; 
                updateHighlights(sel.i, n.toString()); 
            } else { 
                errs++; 
                document.getElementById('errs').innerText = `ОШИБКИ: ${errs}/3`; 
                sel.el.classList.add('error');
                if(errs >= 3) { isOver = true; alert("GAME OVER! Система перегружена. Нажми на сложность, чтобы начать заново."); }
            }
        }

        function drawNotes(el, i) {
            el.innerHTML = '<div class="note-grid">' + [1,2,3,4,5,6,7,8,9].map(x => `<div>${notes[i].includes(x)?x:''}</div>`).join('') + '</div>';
        }

        newGame();
    </script>
</body>
</html>
